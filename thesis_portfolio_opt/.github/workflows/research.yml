name: Research Pipeline

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Pipeline step to run"
        required: false
        default: "features"
        type: choice
        options:
          - features
          - train
          - backtest
          - figures
          - all

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install libomp (XGBoost / LightGBM dependency)
        run: sudo apt-get update && sudo apt-get install -y libomp-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline (features step -- uses cached data)
        run: python run_pipeline.py --step ${{ github.event.inputs.step }}

      - name: Run tests
        run: python -m pytest tests/ -v --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 30
